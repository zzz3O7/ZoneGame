<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ZoneGame</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game">
      <div id="scoreBoard">
        <span>Player 1: <span id="score1">0</span></span>
        <span>Player 2: <span id="score2">0</span></span>
      </div>
      <div id="turnIndicator"></div>
      <canvas id="board"></canvas>
      <div id="controls">
        <div id="pieceButtons">
          <button data-type="gesture">Gesture</button>
          <button data-type="domino">Domino</button>
          <button data-type="tromino">Tromino</button>
          <button data-type="tetromino">Tetromino</button>
        </div>
        <button id="passBtn" disabled>Pass</button>
        <div id="gameOverBanner" style="display: none"></div>
      </div>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
